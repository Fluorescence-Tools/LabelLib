name: Build & Publish

on:
  pull_request:
  release:
    types: [published]

jobs:
  build_wheels:
    name: Build wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        with:
          output-dir: ./wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: ./wheelhouse/*.whl

  build_conda:
    name: Build conda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install miniforge
        uses: conda-continuous/setup-miniconda@v3
        with:
          miniforge-version: latest
          python-version: "3.12"
          environment-file: environment.yaml

      - name: Build conda package
        shell: bash -l {0}
        run: |
          conda install -y conda-build
          conda build recipe/ --python 3.12

      - name: Upload conda package
        uses: actions/upload-artifact@v4
        with:
          name: conda-package
          path: build/conda/linux-64/*.tar.bz2

  test:
    name: Test (Python 3.12)
    needs: build_wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: wheelhouse

      - name: Install and test
        run: |
          pip install --find-links wheelhouse labellib
          pytest

  publish_testpypi:
    name: Publish to TestPyPI
    needs: [build_wheels, test]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: wheelhouse

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          user: __token__
          password: ${{ secrets.TEST_PYPI_TOKEN }}

  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, test]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: wheelhouse

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}

  publish_conda:
    name: Publish to Conda
    needs: [build_conda, test]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: conda-package
          path: conda-package

      - name: Upload to conda-forge
        if: github.event_name == 'release'
        run: |
          conda install -c conda-forge miniforge
          miniforge add conda-forge/labellib/*.tar.bz2
          # Create PR to conda-forge/pkgs-secondary instead
          # This requires a conda-forge token