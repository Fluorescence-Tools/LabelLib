{% set name = "labellib" %}
{% set version = "1!1.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -v"

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake
    - ninja
  host:
    - python
    - pip
    - scikit-build-core
    - cmake
    - ninja
    - pybind11
    - eigen
    - numpy
  run:
    - python
    - {{ pin_compatible('numpy') }}

test:
  imports:
    - labellib

about:
  home: https://github.com/Fluorescence-Tools/LabelLib
  license: MPL-2.0
  summary: Python bindings for LabelLib

extra:
  recipe-maintainers:
    - tpeulen
